<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание ЮТК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0b0e16;
            color: #edf2ff;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c0e0ff, #8ab3f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .group-panel {
            background: #11161f;
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 28px;
            border: 1px solid #232a38;
        }
        .group-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .group-btn {
            background: #1a212e;
            border: none;
            color: #cbd5ff;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .group-btn.active, .group-btn:hover {
            background: #3e5a8c;
            color: white;
        }
        .schedule-card {
            background: #11161f;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #232a38;
        }
        .day-header {
            border-bottom: 1px solid #293141;
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .day-week { font-size: 1.3rem; font-weight: 700; color: #c0e0ff; }
        .pair {
            background: #0b1018;
            border-radius: 24px;
            padding: 14px 18px;
            margin-bottom: 10px;
            border-left: 4px solid #4a6bb5;
        }
        .pair-num { font-weight: 600; margin-bottom: 6px; color: #bbd4ff; }
        .pair-subj { font-weight: 500; white-space: pre-line; }
        .pair-teacher { font-size: 0.75rem; opacity: 0.7; margin-top: 4px; }
        .empty-day { text-align: center; padding: 36px; color: #7b8bb0; }
        .status { text-align: center; font-size: 0.75rem; color: #6a7ca3; margin: 16px 0; }
        .footer { text-align: center; margin-top: 32px; font-size: 0.7rem; color: #44506e; }
        .last-updated { text-align: center; font-size: 0.7rem; margin-top: 8px; color: #5a6b8a; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">📚 ЮТК | Расписание</div>
        <div class="status">Юргинский технологический колледж</div>
    </div>

    <div class="group-panel">
        <div class="group-list" id="groupList">Загрузка...</div>
    </div>

    <div class="schedule-card" id="scheduleCard">
        <div class="empty-day">📌 Выберите группу</div>
    </div>
    <div class="footer">🔄 Расписание обновлено 11.06.2026</div>
</div>

<script>
    let scheduleData = {};
    
    const groups = ["152","153","154","155","252","253","254","255","343","344","352","353","354","355","454","455","512","513","514","515","552","553","554","555","652","653","655","754","755","812","813","814","815","852","853","854","855","952","953","954","955"];
    
    async function loadData() {
        try {
            const res = await fetch('data/schedule.json?v=' + Date.now());
            scheduleData = await res.json();
            renderGroups();
        } catch (e) {
            document.getElementById('groupList').innerHTML = '<div style="color:#ff8888;">❌ Не удалось загрузить данные. Убедитесь, что файл schedule.json лежит в папке data/</div>';
        }
    }
    
    function renderGroups() {
        const container = document.getElementById('groupList');
        container.innerHTML = '';
        groups.forEach(group => {
            if (!scheduleData[group]) return;
            const btn = document.createElement('button');
            btn.className = 'group-btn';
            btn.textContent = group;
            btn.onclick = () => {
                document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                showSchedule(group);
            };
            container.appendChild(btn);
        });
        if (groups.length) {
            const first = groups.find(g => scheduleData[g]);
            if (first) showSchedule(first);
        }
    }
    
    function showSchedule(group) {
        const card = document.getElementById('scheduleCard');
        const days = scheduleData[group];
        
        if (!days || days.length === 0) {
            card.innerHTML = '<div class="empty-day">📭 Нет данных для этой группы</div>';
            return;
        }
        
        const today = new Date();
        today.setHours(0,0,0,0);
        const future = days.filter(d => {
            const [day, month, year] = d.date.split('.');
            const dDate = new Date(`${year}-${month}-${day}`);
            return dDate >= today;
        });
        
        const nearest = future[0] || days[0];
        const weekdays = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        const [day, month, year] = nearest.date.split('.');
        const dateObj = new Date(`${year}-${month}-${day}`);
        const weekday = weekdays[dateObj.getDay()];
        
        let pairsHtml = '';
        for (let p of nearest.pairs) {
            let subject = p.subject;
            let teacher = '';
            if (subject.includes('\n')) {
                const parts = subject.split('\n');
                subject = parts[0];
                teacher = parts[1];
            }
            pairsHtml += `
                <div class="pair">
                    <div class="pair-num">${p.num} пара</div>
                    <div class="pair-subj">${escapeHtml(subject)}</div>
                    ${teacher ? `<div class="pair-teacher">${escapeHtml(teacher)}</div>` : ''}
                </div>
            `;
        }
        
        card.innerHTML = `
            <div class="day-header">
                <span class="day-week">${weekday}</span>
                <span style="opacity:0.7;">${nearest.date}</span>
            </div>
            ${pairsHtml || '<div class="empty-day">✨ Пар нет ✨</div>'}
            <div style="margin-top:16px; font-size:0.7rem; text-align:center; opacity:0.6;">Группа ${group}</div>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadData();
</script>
</body>
</html>
