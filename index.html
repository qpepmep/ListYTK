<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Расписание — Юргинский технологический колледж</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Inter', Helvetica, sans-serif;
            background: #0b0e16;
            color: #edf2ff;
            padding: 20px;
            padding-bottom: 60px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c0e0ff, #8ab3f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subhead {
            color: #8a9bcc;
            font-size: 0.85rem;
        }

        .group-panel {
            background: #11161f;
            border-radius: 32px;
            padding: 16px 18px;
            margin-bottom: 28px;
            border: 1px solid #232a38;
        }
        .group-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7b8bb0;
            margin-bottom: 12px;
        }
        .group-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px 2px;
        }
        .group-btn {
            background: #1a212e;
            border: none;
            color: #cbd5ff;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .group-btn:hover {
            background: #2a3448;
            color: white;
        }
        .group-btn.active {
            background: #3e5a8c;
            color: white;
            box-shadow: 0 2px 8px rgba(62, 90, 140, 0.4);
        }

        .status {
            font-size: 0.75rem;
            color: #6a7ca3;
            margin-bottom: 20px;
            text-align: center;
        }

        .schedule-card {
            background: #11161f;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #232a38;
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            padding-bottom: 12px;
            border-bottom: 1px solid #293141;
            margin-bottom: 20px;
        }
        .day-week {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0eaff, #adc0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .day-date {
            color: #8d9ed0;
            font-size: 0.8rem;
        }
        .pair-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .pair {
            background: #0b1018;
            border-radius: 24px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            border-left: 4px solid #4a6bb5;
        }
        .pair-num {
            background: #1b2538;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 65px;
            text-align: center;
            color: #bbd4ff;
        }
        .pair-subj {
            flex: 2;
            font-weight: 500;
        }
        .pair-teacher {
            font-size: 0.7rem;
            color: #96a9d4;
            background: #0f1624;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .empty-day {
            text-align: center;
            padding: 36px 20px;
            color: #7b8bb0;
            background: #0b1018;
            border-radius: 28px;
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 0.7rem;
            color: #44506e;
        }
        @media (max-width: 550px) {
            .pair { flex-direction: column; align-items: flex-start; }
            .pair-num { align-self: flex-start; }
        }
        .error-box {
            background: #2a1a1a;
            border: 1px solid #b54a4a;
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
            text-align: center;
            color: #ffaeae;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #8a9bcc;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">📚 ЮТК | Расписание</div>
        <div class="subhead">Юргинский технологический колледж — ваш стиль</div>
    </div>

    <div class="group-panel">
        <div class="group-label">🎓 Выберите группу</div>
        <div class="group-list" id="groupList">
            <div class="loading">Загрузка списка групп...</div>
        </div>
    </div>

    <div class="status" id="statusMsg">⚡ Выберите группу, чтобы увидеть расписание</div>

    <div class="schedule-card" id="scheduleCard">
        <div class="empty-day">📌 Нажмите на любую группу выше</div>
    </div>
    <div class="footer">🔄 Данные обновляются автоматически с сайта колледжа</div>
</div>

<script>
    // Другой, более надёжный прокси (CORS Anywhere)
    const PROXY = 'https://cors-anywhere.herokuapp.com/';
    
    // Фиксированный список групп (из cg.htm)
    // Номер страницы для каждой группы (угадываем: 455 -> cg16.htm, остальные подбираем)
    // Мы сначала попробуем загрузить список, но если не получится — используем этот
    const FALLBACK_GROUPS = [
        "152","153","154","155","252","253","254","255","343","344",
        "352","353","354","355","454","455","512","513","514","515",
        "552","553","554","555","652","653","655","754","755","812",
        "813","814","815","852","853","854","855","952","953","954","955"
    ];
    
    // Соответствие группы и номера страницы (будем заполнять)
    let groupPageMap = new Map();
    let groupsList = [];
    
    async function fetchViaProxy(url) {
        // Пробуем напрямую с прокси
        const proxyUrl = PROXY + url;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 секунд таймаут
        
        try {
            const response = await fetch(proxyUrl, {
                signal: controller.signal,
                headers: {
                    'Origin': window.location.origin
                }
            });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        } catch (err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }
    
    // Загрузка списка групп с cg.htm
    async function loadGroups() {
        const container = document.getElementById('groupList');
        try {
            const html = await fetchViaProxy('https://ytk-edu.ru/newrasp/cg.htm');
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Ищем все ссылки на страницы групп
            const links = doc.querySelectorAll('a');
            const groups = [];
            
            for (let link of links) {
                const href = link.getAttribute('href');
                const text = link.innerText?.trim();
                if (href && href.startsWith('cg') && href.endsWith('.htm')) {
                    const match = href.match(/cg(\d+)\.htm/);
                    if (match && text && /^\d{3}$/.test(text)) {
                        groups.push(text);
                        groupPageMap.set(text, match[1]);
                    }
                }
            }
            
            if (groups.length === 0) {
                // Если не нашли через ссылки, используем fallback
                throw new Error('Не найдены ссылки на группы');
            }
            
            groupsList = groups;
            renderGroupButtons(groups);
            return groups;
        } catch (error) {
            console.warn('Ошибка загрузки списка, используем резервный:', error);
            // Используем fallback список групп
            groupsList = FALLBACK_GROUPS;
            // Для fallback групп пытаемся определить страницы по логике:
            // Для 455 мы знаем cg16.htm. Для остальных — попробуем найти вручную позже
            renderGroupButtons(FALLBACK_GROUPS);
            return FALLBACK_GROUPS;
        }
    }
    
    function renderGroupButtons(groups) {
        const container = document.getElementById('groupList');
        container.innerHTML = '';
        groups.forEach(group => {
            const btn = document.createElement('button');
            btn.className = 'group-btn';
            btn.textContent = group;
            btn.onclick = () => {
                document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadScheduleForGroup(group);
            };
            container.appendChild(btn);
        });
        if (groups.length > 0) {
            document.querySelector('.group-btn')?.classList.add('active');
            loadScheduleForGroup(groups[0]);
        }
    }
    
    // Получение номера страницы для группы
    async function getGroupPageNumber(group) {
        // Если уже знаем
        if (groupPageMap.has(group)) {
            return groupPageMap.get(group);
        }
        
        // Пытаемся загрузить cg.htm и найти соответствие
        try {
            const html = await fetchViaProxy('https://ytk-edu.ru/newrasp/cg.htm');
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const links = doc.querySelectorAll('a');
            for (let link of links) {
                const href = link.getAttribute('href');
                const text = link.innerText?.trim();
                if (href && href.startsWith('cg') && href.endsWith('.htm') && text === group) {
                    const match = href.match(/cg(\d+)\.htm/);
                    if (match) {
                        groupPageMap.set(group, match[1]);
                        return match[1];
                    }
                }
            }
        } catch (e) {
            console.warn('Не удалось найти страницу для группы', group);
        }
        
        // Если не нашли — пробуем угадать по индексу в списке (не точно, но работает для многих)
        const index = groupsList.indexOf(group);
        if (index !== -1) {
            // cg1.htm — 152, cg2.htm — 153 и т.д., но сдвиг: для 455 это cg16
            const guessedPage = index + 1;
            return guessedPage.toString();
        }
        
        return null;
    }
    
    async function loadScheduleForGroup(group) {
        const statusDiv = document.getElementById('statusMsg');
        const cardDiv = document.getElementById('scheduleCard');
        statusDiv.innerHTML = `⏳ Загрузка расписания группы ${group}...`;
        cardDiv.innerHTML = '<div class="empty-day">📖 Загружаем расписание...</div>';
        
        try {
            let pageNum = await getGroupPageNumber(group);
            if (!pageNum) {
                // Последняя попытка: для 455 точно cg16
                if (group === '455') pageNum = '16';
                else throw new Error('Не найден номер страницы для группы');
            }
            
            const scheduleUrl = `https://ytk-edu.ru/newrasp/cg${pageNum}.htm`;
            console.log('Загрузка:', scheduleUrl);
            const html = await fetchViaProxy(scheduleUrl);
            const scheduleDays = parseScheduleHtml(html);
            
            if (scheduleDays.length === 0) throw new Error('Расписание пустое');
            
            renderSchedule(scheduleDays, group);
            statusDiv.innerHTML = `✅ Группа ${group} — расписание от ${new Date().toLocaleDateString()}`;
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `⚠️ Ошибка загрузки группы ${group}`;
            cardDiv.innerHTML = `<div class="error-box">❌ Не удалось загрузить расписание для группы ${group}.<br>Ошибка: ${error.message}<br><br>💡 Возможно, сайт колледжа временно недоступен или изменилась структура.</div>`;
        }
    }
    
    function parseScheduleHtml(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        
        const tables = doc.querySelectorAll('table');
        let scheduleTable = null;
        for (let table of tables) {
            if (table.innerText.includes('Пара') || (table.innerText.includes('День') && table.innerText.includes('ИП'))) {
                scheduleTable = table;
                break;
            }
        }
        if (!scheduleTable) return [];
        
        const rows = scheduleTable.querySelectorAll('tr');
        let days = [];
        let currentDay = null;
        
        for (let row of rows) {
            const cells = row.querySelectorAll('td');
            if (cells.length < 2) continue;
            
            const first = cells[0]?.innerText?.trim() || '';
            const second = cells[1]?.innerText?.trim() || '';
            
            const dateMatch = first.match(/(\d{2}\.\d{2}\.\d{4})/);
            if (dateMatch && (first.includes('-1') || first.includes('-2') || first.match(/[а-я]/i))) {
                if (currentDay) days.push(currentDay);
                const [day, month, year] = dateMatch[1].split('.');
                const isoDate = `${year}-${month}-${day}`;
                currentDay = {
                    date: isoDate,
                    displayDate: dateMatch[1],
                    dayWeek: first,
                    pairs: []
                };
                if (second && second !== '' && !second.includes('Пара') && !second.includes('День')) {
                    const { subject, teacher } = parseSubjectTeacher(second);
                    currentDay.pairs.push({ number: '1', subject, teacher });
                }
            }
            else if (currentDay && first.match(/^\d+$/) && second && second !== '') {
                const { subject, teacher } = parseSubjectTeacher(second);
                currentDay.pairs.push({
                    number: first,
                    subject: subject,
                    teacher: teacher
                });
            }
        }
        if (currentDay) days.push(currentDay);
        
        const today = new Date();
        today.setHours(0,0,0,0);
        return days.filter(day => new Date(day.date) >= today).slice(0, 14);
    }
    
    function parseSubjectTeacher(str) {
        let subject = str.trim();
        let teacher = '';
        const lines = str.split(/\r?\n/);
        if (lines.length >= 2) {
            subject = lines[0].trim();
            teacher = lines[1].trim();
        } else if (str.includes('  ')) {
            const parts = str.split(/\s{2,}/);
            if (parts.length >= 2) {
                subject = parts[0].trim();
                teacher = parts[1].trim();
            }
        }
        return { subject, teacher };
    }
    
    function renderSchedule(days, group) {
        const container = document.getElementById('scheduleCard');
        if (!days.length) {
            container.innerHTML = '<div class="empty-day">📭 Нет пар на ближайшие дни</div>';
            return;
        }
        
        let targetDay = days.find(d => d.pairs.length > 0) || days[0];
        
        const weekdays = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
        const dateObj = new Date(targetDay.date);
        const weekdayName = weekdays[dateObj.getDay()];
        
        let pairsHtml = '';
        if (targetDay.pairs.length === 0) {
            pairsHtml = '<div class="empty-day">✨ Пар нет ✨</div>';
        } else {
            pairsHtml = `<div class="pair-list">` + targetDay.pairs.map(p => `
                <div class="pair">
                    <div class="pair-num">${p.number} пара</div>
                    <div class="pair-subj">${escapeHtml(p.subject)}</div>
                    ${p.teacher ? `<div class="pair-teacher">${escapeHtml(p.teacher)}</div>` : ''}
                </div>
            `).join('') + `</div>`;
        }
        
        container.innerHTML = `
            <div class="day-header">
                <span class="day-week">${weekdayName} ${targetDay.dayWeek ? `(${targetDay.dayWeek})` : ''}</span>
                <span class="day-date">${targetDay.displayDate}</span>
            </div>
            ${pairsHtml}
            <div style="margin-top: 16px; font-size:0.7rem; text-align:center; opacity:0.6;">Группа ${group} • ближайший день с парами</div>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Запуск
    loadGroups();
</script>
</body>
</html>
